[workspace]
members = [
    "crates/types",
    "crates/config",
    "crates/observability",
    "crates/db",
    "crates/test-support",
    "crates/sync-worker",
    "crates/shadow-ffi",
    "crates/libsqlite3-sys",
]
resolver = "2"

# Redirect rusqlite's libsqlite3-sys dependency to our fork, which compiles the
# vendored @rocicorp/zero-sqlite3 amalgamation (SQLite 3.50.0 with WAL2 +
# BEGIN CONCURRENT) with the exact flags from zero-sqlite3/deps/download.sh.
[patch.crates-io]
libsqlite3-sys = { path = "crates/libsqlite3-sys" }

[workspace.package]
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/rocicorp/mono"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# PostgreSQL (kept — sync-worker CVR is PG-backed)
tokio-postgres = { version = "0.7", features = ["with-serde_json-1"] }
deadpool-postgres = "0.14"
postgres-types = { version = "0.2", features = ["with-serde_json-1"] }
postgres-protocol = "0.6"

# TLS for PG
native-tls = "0.2"
postgres-native-tls = "0.5"

# SQLite (kept — sync-worker reads the replica via Snapshotter)
rusqlite = { version = "0.32", features = ["bundled", "column_decltype", "backup"] }

# Serialization
serde = { version = "1", features = ["derive", "rc"] }
serde_json = { version = "1", features = ["preserve_order"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging + Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
tracing-opentelemetry = "0.28"
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }

# Config
clap = { version = "4", features = ["derive", "env"] }

# Concurrency
crossbeam = "0.8"
crossbeam-channel = "0.5"
dashmap = "6"
rayon = "1"

# Generators on stable Rust (TS function*/yield equivalent for IVM operators)
genawaiter = { version = "0.99", default-features = false, features = ["proc_macro"] }

# LIKE/ILIKE pattern matching for AST predicate translation
regex-lite = "0.1"

# Data structures
smallvec = { version = "1", features = ["serde"] }
indexmap = { version = "2", features = ["serde"] }

# Utilities
uuid = { version = "1", features = ["v4"] }
url = "2"
bytes = "1"
futures = "0.3"
xxhash-rust = { version = "0.8", features = ["xxh32", "xxh64"] }

# Testing
tempfile = "3"
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }

# Benchmarking
criterion = { version = "0.5", features = ["html_reports"] }

# Workspace test-support crate
zero-cache-test-support = { path = "crates/test-support" }

# Workspace crates (kept — needed by sync-worker port + shadow harness)
zero-cache-types = { path = "crates/types" }
zero-cache-config = { path = "crates/config" }
zero-cache-observability = { path = "crates/observability" }
zero-cache-db = { path = "crates/db" }
zero-cache-sync-worker = { path = "crates/sync-worker" }
